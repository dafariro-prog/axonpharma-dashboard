name: Refresco diario del dashboard Maruchan

on:
  schedule:
    # 11:00 UTC = 05:00 Costa Rica. Corre todos los días.
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # permite correrlo manualmente desde la pestaña Actions

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Jalar data real de Meta (Windsor.ai)
        env:
          WINDSOR_API_KEY: ${{ secrets.WINDSOR_API_KEY }}
        run: node refresh.js

      - name: Commit si hubo cambios
        run: |
          git config user.name  "maruchan-bot"
          git config user.email "actions@github.com"
          git add data/dashboard.json
          if git diff --staged --quiet; then
            echo "Sin cambios en la data."
          else
            git commit -m "chore: refresco data $(date -u +%Y-%m-%d)"
            git push
          fi
